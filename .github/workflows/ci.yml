name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      # No standalone linter is configured for this thin client; `npm run build`
      # runs `tsc`, which type-checks the full source as the lint gate.
      - name: Build (tsc typecheck + emit)
        run: npm run build

      - name: Test
        run: npm test
